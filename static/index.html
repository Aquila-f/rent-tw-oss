<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rent-tw — 台灣租屋地圖</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>rent-tw — 台灣租屋地圖</header>

<div id="content">
  <div id="sidebar">
    <div id="sidebar-header">租屋列表</div>
    <details id="filters" open>
      <summary>篩選條件</summary>
      <div class="filter-body">
        <div class="filter-group">
          <label>租金 (NT$/月)</label>
          <div class="filter-row">
            <input type="number" id="f-price-min" placeholder="最低" min="0" step="1000">
            <span>~</span>
            <input type="number" id="f-price-max" placeholder="最高" min="0" step="1000">
          </div>
        </div>
        <div class="filter-group">
          <label>房型</label>
          <div class="filter-checks" id="f-room-type"></div>
        </div>
        <div class="filter-group">
          <label>條件</label>
          <div class="filter-toggles">
            <label><input type="checkbox" id="f-elevator"><span>有電梯</span></label>
            <label><input type="checkbox" id="f-balcony"><span>有陽台</span></label>
            <label><input type="checkbox" id="f-washer"><span>有洗衣機</span></label>
            <label><input type="checkbox" id="f-pets"><span>可養寵物</span></label>
          </div>
        </div>
        <div id="filter-count"></div>
      </div>
    </details>
    <div id="sort-bar">
      <label for="sort-select">排序</label>
      <select id="sort-select">
        <option value="time-desc">時間 新→舊</option>
        <option value="time-asc">時間 舊→新</option>
        <option value="price-asc">價錢 低→高</option>
        <option value="price-desc">價錢 高→低</option>
      </select>
    </div>
    <ul id="sidebar-list"></ul>
  </div>

  <div id="map"></div>

  <div id="panel">
    <button id="panel-close" title="關閉">✕</button>
    <div id="panel-body">
      <div id="panel-city"></div>
      <div id="panel-title"></div>
      <div id="panel-price"></div>
      <div id="panel-images"></div>
      <div id="panel-content"></div>
      <a id="panel-link" target="_blank" rel="noopener">查看 FB 原始貼文</a>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const taipeibounds = L.latLngBounds(
    [24.95, 121.40],
    [25.22, 121.70]
  );

  const map = L.map('map', {
    maxBounds: taipeibounds,
    maxBoundsViscosity: 1.0,
    minZoom: 11,
  }).setView([25.05, 121.55], 12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
  }).addTo(map);

  const panel      = document.getElementById('panel');
  const panelClose = document.getElementById('panel-close');
  const elCity     = document.getElementById('panel-city');
  const elTitle    = document.getElementById('panel-title');
  const elPrice    = document.getElementById('panel-price');
  const elImages   = document.getElementById('panel-images');
  const elContent  = document.getElementById('panel-content');
  const elLink     = document.getElementById('panel-link');
  const sidebarList = document.getElementById('sidebar-list');

  const defaultIcon = new L.Icon.Default();
  const hoverIcon   = new L.Icon.Default({ className: 'lf-pin-orange', iconSize: [38, 62], iconAnchor: [19, 62], shadowSize: [62, 62] });
  const activeIcon  = new L.Icon.Default({ className: 'lf-pin-green',  iconSize: [38, 62], iconAnchor: [19, 62], shadowSize: [62, 62] });

  let allPosts = [];
  let selectedPostId = null;
  const markerMap = new Map(); // id -> marker

  // --- 篩選 ---
  const fPriceMin  = document.getElementById('f-price-min');
  const fPriceMax  = document.getElementById('f-price-max');
  const fRoomType  = document.getElementById('f-room-type');
  const fElevator  = document.getElementById('f-elevator');
  const fBalcony   = document.getElementById('f-balcony');
  const fWasher    = document.getElementById('f-washer');
  const fPets      = document.getElementById('f-pets');
  const filterCount = document.getElementById('filter-count');
  const sortSelect  = document.getElementById('sort-select');

  function getSelectedRoomTypes() {
    return [...fRoomType.querySelectorAll('input:checked')].map(cb => cb.value);
  }

  function matchesFilters(post) {
    const pMin = fPriceMin.value !== '' ? Number(fPriceMin.value) : null;
    const pMax = fPriceMax.value !== '' ? Number(fPriceMax.value) : null;
    if (pMin !== null && (post.price == null || post.price < pMin)) return false;
    if (pMax !== null && (post.price == null || post.price > pMax)) return false;

    const roomTypes = getSelectedRoomTypes();
    if (roomTypes.length > 0 && (post.room_type == null || !roomTypes.includes(post.room_type))) return false;

    if (fElevator.checked && !post.has_elevator) return false;
    if (fBalcony.checked  && !post.has_balcony)  return false;
    if (fWasher.checked   && !post.has_washing_machine) return false;
    if (fPets.checked     && !post.pets_allowed) return false;

    return true;
  }

  function applyFilters() {
    const total = allPosts.length;
    let matched = 0;
    allPosts.forEach(post => {
      const show = matchesFilters(post);
      if (show) matched++;
      const marker = markerMap.get(post.post_id);
      if (marker) {
        if (show) marker.addTo(map);
        else marker.remove();
      }
    });
    filterCount.textContent = `顯示 ${matched} / ${total} 筆`;
    updateSidebar();
  }

  function buildRoomTypeOptions() {
    const types = [...new Set(allPosts.map(p => p.room_type).filter(Boolean))].sort();
    fRoomType.innerHTML = '';
    types.forEach(t => {
      const label = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.value = t;
      cb.addEventListener('change', applyFilters);
      const span = document.createElement('span');
      span.textContent = t;
      label.appendChild(cb);
      label.appendChild(span);
      fRoomType.appendChild(label);
    });
  }

  [fPriceMin, fPriceMax].forEach(el => el.addEventListener('input', applyFilters));
  [fElevator, fBalcony, fWasher, fPets].forEach(el => el.addEventListener('change', applyFilters));
  sortSelect.addEventListener('change', updateSidebar);

  function openPanel(post) {
    elCity.textContent  = post.city || '';
    elTitle.textContent = post.title || '(無標題)';
    elPrice.textContent = '';
    if (post.price != null) {
      elPrice.textContent = 'NT$' + post.price.toLocaleString('zh-TW') + ' ';
      const unit = document.createElement('span');
      unit.textContent = '/ 月';
      elPrice.appendChild(unit);
    } else {
      elPrice.textContent = '價格未知';
    }
    elContent.textContent = post.content || '';

    elImages.innerHTML = '';
    (post.images || []).forEach(src => {
      const img = document.createElement('img');
      img.src = src;
      img.alt = post.title;
      elImages.appendChild(img);
    });

    if (post.post_url) {
      elLink.href = post.post_url;
      elLink.classList.remove('hidden');
    } else {
      elLink.classList.add('hidden');
    }

    panel.classList.add('open');
  }

  function selectPost(post) {
    // 還原前一個選中的圖釘
    if (selectedPostId !== null) {
      markerMap.get(selectedPostId)?.setIcon(defaultIcon);
    }
    selectedPostId = post.post_id;
    markerMap.get(post.post_id)?.setIcon(activeIcon);

    openPanel(post);
    // 更新 sidebar active 狀態
    sidebarList.querySelectorAll('.sidebar-item').forEach(li => {
      li.classList.toggle('active', li.dataset.id === post.post_id);
    });
  }

  function updateSidebar() {
    const bounds = map.getBounds();
    const visible = allPosts.filter(p => p.lat != null && p.lng != null && bounds.contains([p.lat, p.lng]) && matchesFilters(p));

    const sortVal = sortSelect.value;
    visible.sort((a, b) => {
      if (sortVal === 'time-desc') return (b.timestamp || '').localeCompare(a.timestamp || '');
      if (sortVal === 'time-asc')  return (a.timestamp || '').localeCompare(b.timestamp || '');
      if (sortVal === 'price-asc') return (a.price ?? Infinity) - (b.price ?? Infinity);
      if (sortVal === 'price-desc') return (b.price ?? -Infinity) - (a.price ?? -Infinity);
      return 0;
    });

    sidebarList.innerHTML = '';
    visible.forEach(post => {
      const li = document.createElement('li');
      li.className = 'sidebar-item';
      li.dataset.id = post.post_id;
      const titleDiv = document.createElement('div');
      titleDiv.className = 'sidebar-item-title';
      titleDiv.textContent = post.title || '(無標題)';
      const metaDiv = document.createElement('div');
      metaDiv.className = 'sidebar-item-meta';
      metaDiv.textContent = (post.city || '') + ' \u00A0·\u00A0 ';
      const priceSpan = document.createElement('span');
      priceSpan.className = 'sidebar-item-price';
      priceSpan.textContent = post.price != null ? 'NT$' + post.price.toLocaleString('zh-TW') : '價格未知';
      metaDiv.appendChild(priceSpan);
      li.appendChild(titleDiv);
      li.appendChild(metaDiv);
      li.addEventListener('click', () => {
        map.setView([post.lat, post.lng], map.getZoom());
        selectPost(post);
      });
      li.addEventListener('mouseenter', () => {
        markerMap.get(post.post_id)?.setIcon(hoverIcon);
      });
      li.addEventListener('mouseleave', () => {
        markerMap.get(post.post_id)?.setIcon(post.post_id === selectedPostId ? activeIcon : defaultIcon);
      });
      sidebarList.appendChild(li);
    });
  }

  panelClose.addEventListener('click', () => {
    panel.classList.remove('open');
    sidebarList.querySelectorAll('.sidebar-item').forEach(li => li.classList.remove('active'));
    if (selectedPostId !== null) {
      markerMap.get(selectedPostId)?.setIcon(defaultIcon);
      selectedPostId = null;
    }
  });

  map.on('moveend zoomend', updateSidebar);

  fetch('/api/listings')
    .then(res => {
      if (!res.ok) throw new Error('無法載入資料');
      return res.json();
    })
    .then(listings => {
      allPosts = listings;
      listings.filter(p => p.lat != null && p.lng != null).forEach(post => {
        const marker = L.marker([post.lat, post.lng], { icon: defaultIcon })
          .addTo(map)
          .on('click', () => selectPost(post));
        markerMap.set(post.post_id, marker);
      });
      buildRoomTypeOptions();
      applyFilters();
    })
    .catch(err => {
      console.error(err);
      alert('無法載入租屋資料，請確認伺服器是否運行中。');
    });
</script>

</body>
</html>
